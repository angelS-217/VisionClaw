name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Force Rewrite AudioManager
        # This absolutely forces the file to contain the correct code, ignoring whatever GitHub downloaded
        run: |
          cd samples/CameraAccess/CameraAccess/Gemini
          # We use sed to replace the broken line. If it fails, it prints why.
          sed -i '' 's/\.allowBluetoothHFP/\.allowBluetooth/g' AudioManager.swift
          echo "Verification: Here is line 53 of the rewritten file:"
          sed -n '53p' AudioManager.swift

      - name: Create Secrets.swift
        run: |
          cd samples/CameraAccess/CameraAccess
          cp Secrets.swift.example Secrets.swift

      - name: Build App
        run: |
          cd samples/CameraAccess
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CONFIGURATION_BUILD_DIR="${PWD}/build" | xcpretty

      - name: Package into .IPA
        run: |
          cd samples/CameraAccess
          mkdir -p Payload
          cp -r build/CameraAccess.app Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-iOS-App
          path: samples/CameraAccess/VisionClaw.ipa
