name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift Packages
        # This ensures all external libraries (like Gemini or WebRTC) are downloaded
        run: |
          cd samples/CameraAccess
          xcodebuild -resolvePackageDependencies -project CameraAccess.xcodeproj -scheme CameraAccess

      - name: Auto-Fix Audio Code Error (Aggressive)
        # This finds the file no matter where it is and fixes the Bluetooth constant
        run: |
          find . -name "AudioManager.swift" -exec sed -i '' 's/\.allowBluetoothHFP/\.allowBluetooth/g' {} +

      - name: Create Secrets.swift
        run: |
          find . -name "Secrets.swift.example" -exec cp {} samples/CameraAccess/CameraAccess/Secrets.swift \;

      - name: Build Unsigned iOS App
        run: |
          cd samples/CameraAccess
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED="YES" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            CONFIGURATION_BUILD_DIR="${PWD}/build"

      - name: Package into .IPA
        run: |
          cd samples/CameraAccess
          mkdir -p Payload
          cp -r build/CameraAccess.app Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-iOS-App
          path: samples/CameraAccess/VisionClaw.ipa
