name: Build VisionClaw IPA

on:
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Secrets.swift (Dummy config)
        run: |
          # Creates the secrets file so the build doesn't fail.
          # You can enter your actual Gemini API key inside the app's settings later!
          cd samples/CameraAccess/CameraAccess
          cp Secrets.swift.example Secrets.swift

      - name: Build Unsigned iOS App
        run: |
          cd samples/CameraAccess
          # Compiles the app for iPhone while bypassing Apple's strict code-signing
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="${PWD}/build"

      - name: Package into .IPA
        run: |
          cd samples/CameraAccess
          mkdir Payload
          # Move the compiled app into the Payload folder
          mv build/CameraAccess.app Payload/
          # Compress it into the standard iOS app format (.ipa)
          zip -r VisionClaw.ipa Payload

      - name: Upload IPA for Download
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-iOS-App
          path: samples/CameraAccess/VisionClaw.ipa
