name: Build VisionClaw IPA (Diagnostic)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Sanity Check - Verify Code Fix
        # This forces the log to show us exactly what is written on lines 52-54
        run: |
          echo "Checking what the server sees in AudioManager.swift:"
          sed -n '52,54p' samples/CameraAccess/CameraAccess/Gemini/AudioManager.swift

      - name: Create Secrets.swift
        run: |
          cd samples/CameraAccess/CameraAccess
          cp Secrets.swift.example Secrets.swift

      - name: Build App with xcpretty Filter
        run: |
          cd samples/CameraAccess
          set -o pipefail
          # xcpretty acts as a filter to hide the noise and only show real errors
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CONFIGURATION_BUILD_DIR="${PWD}/build" | xcpretty
