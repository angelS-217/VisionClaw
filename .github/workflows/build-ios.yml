name: Build VisionClaw IPA (Final Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        # We are back on Xcode 16 so it can read the modern .xcodeproj file
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Force Patch AudioManager via Python
        # This will forcefully fix the Bluetooth bug that Xcode 16 hates
        run: |
          python3 -c "
          import os
          filepath = 'samples/CameraAccess/CameraAccess/Gemini/AudioManager.swift'
          if os.path.exists(filepath):
              with open(filepath, 'r') as file:
                  data = file.read()
              
              data = data.replace('.allowBluetoothHFP', '.allowBluetooth')
              
              with open(filepath, 'w') as file:
                  file.write(data)
              print('✅ Successfully patched AudioManager.swift!')
          else:
              print('❌ Error: Could not find AudioManager.swift')
              exit(1)
          "

      - name: Create Secrets.swift
        run: |
          cd samples/CameraAccess/CameraAccess
          cp Secrets.swift.example Secrets.swift

      - name: Build App
        run: |
          cd samples/CameraAccess
          set -o pipefail
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CONFIGURATION_BUILD_DIR="${PWD}/build" | xcpretty

      - name: Package into .IPA
        run: |
          cd samples/CameraAccess
          mkdir -p Payload
          cp -r build/CameraAccess.app Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-iOS-App
          path: samples/CameraAccess/VisionClaw.ipa
