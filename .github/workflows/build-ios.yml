name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Fix Bluetooth & Concurrency Errors
        # This scans all Swift files and fixes the HFP constant and a common actor warning
        run: |
          find . -name "*.swift" -exec sed -i '' 's/\.allowBluetoothHFP/\.allowBluetooth/g' {} +
          find . -name "*.swift" -exec sed -i '' 's/self?\.sendJSON(json)/await self?\.sendJSON(json)/g' {} +

      - name: Setup Secrets
        run: |
          find . -name "Secrets.swift.example" -exec cp {} samples/CameraAccess/CameraAccess/Secrets.swift \;

      - name: Build and Capture Errors
        id: build_step
        run: |
          cd samples/CameraAccess
          # We use a log file to capture the output so we can find the real error if it fails
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CONFIGURATION_BUILD_DIR="${PWD}/build" > build_log.txt 2>&1 || (grep -A 3 "error:" build_log.txt && exit 1)

      - name: Package into .IPA
        if: success()
        run: |
          cd samples/CameraAccess
          mkdir -p Payload
          cp -r build/CameraAccess.app Payload/
          zip -r VisionClaw.ipa Payload

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-iOS-App
          path: samples/CameraAccess/VisionClaw.ipa
