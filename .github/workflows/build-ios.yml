name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Fix Code Errors & Setup Secrets
        run: |
          echo "Finding and fixing Bluetooth error..."
          # This finds the file regardless of depth and replaces the broken constant
          find . -name "AudioManager.swift" -exec sed -i '' 's/\.allowBluetoothHFP/\.allowBluetooth/g' {} +
          
          echo "Setting up Secrets.swift..."
          # Find the example file and copy it to the correct location
          EXAMPLE_FILE=$(find . -name "Secrets.swift.example" | head -n 1)
          TARGET_DIR=$(dirname "$EXAMPLE_FILE")
          cp "$EXAMPLE_FILE" "$TARGET_DIR/Secrets.swift"
          
          echo "Verified files in target directory:"
          ls "$TARGET_DIR"

      - name: Build App
        run: |
          cd samples/CameraAccess
          # We use -quiet to hide the file list and -resultBundlePath to capture errors
          xcodebuild clean build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED="YES" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CONFIGURATION_BUILD_DIR="${PWD}/build" \
            | grep -A 5 "error:" || true 
            # The line above forces the terminal to show only the errors if it fails

      - name: Package into .IPA
        run: |
          cd samples/CameraAccess
          if [ -d "build/CameraAccess.app" ]; then
            mkdir -p Payload
            cp -r build/CameraAccess.app Payload/
            zip -r VisionClaw.ipa Payload
          else
            echo "Build failed - .app folder not found"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-iOS-App
          path: samples/CameraAccess/VisionClaw.ipa
